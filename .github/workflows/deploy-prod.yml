name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets:
      NUCLEO_LICENSE_KEY: ${{ secrets.NUCLEO_LICENSE_KEY }}

  changes:
    name: Detect Changes
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      dashboard: ${{ steps.resolve.outputs.dashboard }}
      api: ${{ steps.resolve.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, will deploy all release apps"
            echo "prev_tag=" >> $GITHUB_OUTPUT
          else
            echo "Previous tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed paths
        if: steps.prev_tag.outputs.prev_tag != ''
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.prev_tag.outputs.prev_tag }}
          filters: |
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/ui/**'
              - 'bun.lock'
            api:
              - 'apps/api/**'
              - 'bun.lock'

      - name: Resolve change flags
        id: resolve
        run: |
          if [ -z "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
            echo "dashboard=true" >> "$GITHUB_OUTPUT"
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "dashboard=${{ steps.filter.outputs.dashboard }}" >> "$GITHUB_OUTPUT"
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
          fi

  deploy-dashboard:
    name: Deploy Dashboard (Production)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    needs: [ci, changes]
    if: needs.changes.outputs.dashboard == 'true'
    environment:
      name: production
      url: ${{ vars.DASHBOARD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun ci
        env:
          NUCLEO_LICENSE_KEY: ${{ secrets.NUCLEO_LICENSE_KEY }}

      - name: Build dashboard
        run: bun run build
        working-directory: apps/dashboard
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_POSTHOG_KEY: ${{ vars.POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/dashboard
          command: deploy --name shiru-dashboard-prod

  deploy-api:
    name: Deploy API (Production)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    needs: [ci, changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.api == ''
    environment:
      name: production
      url: ${{ vars.API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun ci

      - name: Build API
        run: bun run build
        working-directory: apps/api

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          environment: prod
          command: d1 migrations apply shiru-db-prod

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          environment: prod
          command: deploy -c wrangler.jsonc
